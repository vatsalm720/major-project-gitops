apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-app
  namespace: gitops
  labels:
    app.kubernetes.io/part-of: major-project
  annotations:
    # Syncs after monitoring-app (-1): the app namespace contains ServiceMonitor
    # and VerticalPodAutoscaler custom resources whose CRDs are installed by the
    # monitoring stack's operators. Those CRDs must exist before these CRs can
    # be created, so this Application's wave must be >= monitoring-app's wave.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/vatsalm720/major-project-gitops.git
    targetRevision: main
    path: overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
