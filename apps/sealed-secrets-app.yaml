apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-app
  namespace: gitops
  labels:
    app.kubernetes.io/part-of: major-project
  annotations:
    # Wave -1: same level as monitoring-app. Installs the SealedSecrets
    # controller and SealedSecret CRD into kube-system before any environment
    # Application (wave 0) can apply SealedSecret resources.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.18.6
    helm:
      releaseName: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
