apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: gitops
  labels:
    app.kubernetes.io/part-of: major-project
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vatsalm720/major-project-gitops.git
    targetRevision: main
    path: apps
    # No `directory:` block: Argo CD normalizes an explicit `recurse: false`
    # (its own default) down to null on the live object, which made root-app
    # perpetually OutOfSync against itself (it manages its own manifest here).
    # Omitting it is behaviorally identical and lets live == git converge.
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
