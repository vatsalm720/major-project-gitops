apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: worker-service
    app.kubernetes.io/name: worker-service
    app.kubernetes.io/part-of: major-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
        app.kubernetes.io/name: worker-service
        app.kubernetes.io/part-of: major-project
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: worker-service
              topologyKey: kubernetes.io/hostname

      containers:
        - name: worker-service
          image: major-project-worker-service:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 500m
              memory: 256Mi
              ephemeral-storage: 200Mi
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}
