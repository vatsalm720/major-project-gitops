apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-app-services
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from: []
   # - podSelector:
    #    matchLabels:
     #     app: api-service
    #- podSelector:
     #   matchLabels:
      #    app: worker-service
    ports:
    - protocol: TCP
      port: 6379
