# kube-prometheus-stack Helm values
# Target: KIND local cluster (major-project-cluster)
# Namespace: monitoring

# ─── Prometheus Operator ─────────────────────────────────────────────────────
# Disable admission webhooks.
# In KIND the API server cannot reliably reach in-cluster webhook services
# because KIND nodes run as Docker containers with their own network bridges.
# Without disabling this, PrometheusRule/AlertmanagerConfig admission calls
# will time out and block kubectl apply operations.
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false

# ─── Prometheus ──────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Allow Prometheus to discover ServiceMonitors/PrometheusRules from ALL
    # namespaces. Default (true) restricts discovery to resources carrying the
    # Helm release label. Our ServiceMonitors (app ns) and PrometheusRules
    # (monitoring ns) will not carry that label and would be silently ignored.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Allow discovery from any namespace.
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    # Reduce retention — local development cluster.
    retention: 24h

    # Resource limits suitable for a 3-node KIND cluster.
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    # Persistent storage using KIND default StorageClass (standard / local-path).
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

# ─── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: admin
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

  # ── Grafana Alerting provisioning (Task 2.14) ─────────────────────────────
  # These files are written to /etc/grafana/provisioning/alerting/ on startup.
  # Grafana reads them once; a pod restart is required to pick up any changes.
  alerting:
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: webhook-receiver
          receivers:
            - uid: webhook-receiver-uid
              type: webhook
              settings:
                url: http://webhook-listener.monitoring.svc.cluster.local:9000
                httpMethod: POST

    notification-policy.yaml:
      apiVersion: 1
      policies:
        - orgId: 1
          receiver: webhook-receiver
          routes: []

    rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: chaos-service-error-rate
          folder: Major Project Alerts
          interval: 1m
          rules:
            - uid: chaos-svc-high-err-rate
              title: ChaosServiceHighErrorRate
              condition: C
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: prometheus
                  model:
                    datasource:
                      type: prometheus
                      uid: prometheus
                    expr: 'sum(rate(http_errors_total{job="chaos-service"}[5m])) / sum(rate(http_requests_total{job="chaos-service"}[5m]))'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: C
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params:
                            - 0.05
                          type: gt
                        operator:
                          type: and
                        query:
                          params:
                            - A
                        reducer:
                          params: []
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: C
                    type: classic_conditions
              noDataState: OK
              execErrState: Alerting
              for: 1m
              labels:
                severity: warning
                service: chaos-service
              annotations:
                summary: Chaos service error rate exceeds 5%
                description: >-
                  HTTP error rate for chaos-service exceeds 5% over the last 5 minutes.

# ─── Alertmanager ────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

# ─── kube-state-metrics ──────────────────────────────────────────────────────
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── node-exporter ───────────────────────────────────────────────────────────
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi
